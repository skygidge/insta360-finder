<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky's Creator Story Finder (Beta)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    min-height: 100vh;
  }

  header {
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
  }

  header h1 span.beta {
    font-size: 11px;
    font-weight: 500;
    color: #666;
    margin-left: 6px;
    vertical-align: middle;
  }

  .header-stats {
    display: flex;
    gap: 24px;
    font-size: 13px;
    color: #888;
  }

  .header-stats strong { color: #fff; }

  main { max-width: 1100px; margin: 0 auto; padding: 32px; }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    align-items: center;
  }

  input[type="search"] {
    flex: 1;
    min-width: 220px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 10px 16px;
    color: #e8e8e8;
    font-size: 14px;
    outline: none;
  }
  input[type="search"]:focus { border-color: #ff6b00; }

  select {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 10px 14px;
    color: #e8e8e8;
    font-size: 14px;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: #ff6b00; }

  .count { font-size: 13px; color: #666; margin-left: auto; }

  /* Week group */
  .week-group { margin-bottom: 48px; }

  .week-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid #222;
  }

  .week-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #ff6b00;
    text-transform: uppercase;
  }

  .week-meta {
    font-size: 12px;
    color: #555;
  }

  /* Confidence sub-group */
  .conf-group { margin-bottom: 24px; }

  .conf-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 12px;
  }

  .cards-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  /* Card */
  .card {
    background: #1a1a1a;
    border: 1px solid #252525;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.15s, transform 0.15s;
  }

  .card:hover { transform: translateY(-1px); }
  .card.reviewed { border-color: #ff6b00 !important; }

  /* Tabs */
  .card-tabs {
    display: flex;
    border-bottom: 1px solid #222;
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    color: #555;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.1s, background 0.1s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }

  .tab-btn:hover { color: #aaa; background: #1f1f1f; }
  .tab-btn.active { color: #ff6b00; border-bottom-color: #ff6b00; }

  .tab-panel { display: none; padding: 18px 20px; }
  .tab-panel.active { display: block; }

  /* Card content */
  .card-header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
  }

  .card h3 {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    line-height: 1.3;
  }

  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge.high { background: #0d3320; color: #4ade80; }
  .badge.medium { background: #1f2a10; color: #a3e635; }
  .badge.low { background: #2a1a10; color: #fb923c; }

  .card .location {
    font-size: 12px;
    color: #666;
    margin-bottom: 10px;
  }
  .card .location::before { content: '📍 '; }

  .card .product {
    font-size: 12px;
    background: #1f1a2e;
    color: #a78bfa;
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  .card .summary {
    font-size: 13px;
    color: #aaa;
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .card .why {
    font-size: 12px;
    color: #777;
    line-height: 1.5;
    border-top: 1px solid #222;
    padding-top: 10px;
    margin-top: 4px;
    margin-bottom: 12px;
  }

  .card .source-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .card .source-row .source-links {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .card .source-row a.archive-link {
    font-size: 11px;
    opacity: 0.55;
  }

  .source-tag {
    font-size: 11px;
    color: #555;
    background: #1f1f1f;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .card a {
    font-size: 11px;
    color: #ff6b00;
    text-decoration: none;
  }
  .card a:hover { text-decoration: underline; }

  /* Reviewed checkbox */
  .reviewed-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-top: 1px solid #1f1f1f;
    background: #161616;
  }

  .reviewed-row label {
    font-size: 12px;
    color: #666;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .reviewed-row input[type="checkbox"] {
    accent-color: #ff6b00;
    width: 14px;
    height: 14px;
    cursor: pointer;
  }

  .reviewed-row label.checked { color: #ff6b00; }

  /* Outreach tab */
  .outreach-contact {
    font-size: 12px;
    color: #888;
    margin-bottom: 14px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .outreach-contact span { display: flex; align-items: center; gap: 5px; }
  .outreach-contact a { font-size: 12px; }

  .outreach-draft {
    font-size: 12px;
    color: #aaa;
    line-height: 1.7;
    background: #141414;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 14px 16px;
    white-space: pre-wrap;
    font-family: inherit;
  }

  .no-outreach {
    font-size: 13px;
    color: #555;
    font-style: italic;
  }

  /* Empty / loading / error */
  .empty, .loading {
    text-align: center;
    color: #444;
    padding: 80px 20px;
    font-size: 15px;
  }

  .error {
    background: #1f1010;
    border: 1px solid #3a1010;
    border-radius: 8px;
    padding: 16px 20px;
    color: #f87171;
    font-size: 13px;
    margin-bottom: 24px;
  }
</style>
</head>
<body>

<header>
  <h1>Sky's Creator Story Finder <span class="beta">Beta</span></h1>
  <div class="header-stats" id="header-stats">
    <span>Loading...</span>
  </div>
</header>

<main>
  <div class="controls">
    <input type="search" id="search" placeholder="Search by name, location, story…" oninput="filterCards()">
    <select id="filter-conf" onchange="filterCards()">
      <option value="">All confidence</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <select id="filter-source" onchange="filterCards()">
      <option value="">All sources</option>
      <option value="reddit">Reddit</option>
      <option value="youtube">YouTube</option>
      <option value="news">News</option>
      <option value="journal">Journal</option>
      <option value="forum">Forum</option>
      <option value="other">Other</option>
    </select>
    <span class="count" id="count"></span>
  </div>

  <div id="app"><div class="loading">Loading stories…</div></div>
</main>

<script>
const REPO = 'skygidge/insta360-finder';
const RAW = 'https://raw.githubusercontent.com/' + REPO + '/main/';
const LS_KEY = 'insta360_reviewed_v1';

function escapeHTML(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function confidence(c) {
  const v = (c || '').toLowerCase();
  if (v.startsWith('high')) return 'high';
  if (v.startsWith('medium') || v.startsWith('med')) return 'medium';
  return 'low';
}

function confOrder(c) { return c === 'high' ? 0 : c === 'medium' ? 1 : 2; }

function sourceLabel(t) {
  const map = { reddit:'Reddit', youtube:'YouTube', news:'News', journal:'Journal', forum:'Forum', other:'Other' };
  return map[(t||'').toLowerCase()] || t || 'Unknown';
}

function formatDate(d) {
  if (!d) return 'Unknown date';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function storyKey(s) {
  return (s.name + '_' + (s.run_date || '')).replace(/\s+/g, '_');
}

function getReviewed() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch { return {}; }
}

function setReviewed(key, val) {
  const r = getReviewed();
  r[key] = val;
  localStorage.setItem(LS_KEY, JSON.stringify(r));
}

function renderCard(s) {
  const conf = confidence(s.confidence);
  const key = storyKey(s);
  const reviewed = getReviewed()[key] || false;

  const storyPanel = `
    <div class="card-header-row">
      <h3>${escapeHTML(s.name)}</h3>
      <span class="badge ${conf}">${conf.charAt(0).toUpperCase()+conf.slice(1)}</span>
    </div>
    ${s.location ? `<div class="location">${escapeHTML(s.location)}</div>` : ''}
    ${s.product_used ? `<span class="product">${escapeHTML(s.product_used)}</span>` : ''}
    <p class="summary">${escapeHTML(s.story_summary)}</p>
    ${s.why_it_matters ? `<p class="why">${escapeHTML(s.why_it_matters)}</p>` : ''}
    <div class="source-row">
      <span class="source-tag">${escapeHTML(sourceLabel(s.source_type))}</span>
      <span class="source-links">
        ${s.source_link ? `<a href="${escapeHTML(s.source_link)}" target="_blank" rel="noopener">View source →</a>` : ''}
        ${s.source_link ? `<a href="https://web.archive.org/web/*/${s.source_link}" target="_blank" rel="noopener" class="archive-link">Archive ↗</a>` : ''}
      </span>
    </div>`;

  const contactHtml = (() => {
    const parts = [];
    if (s.outreach_email) parts.push(`<span>✉ <a href="mailto:${escapeHTML(s.outreach_email)}">${escapeHTML(s.outreach_email)}</a></span>`);
    if (s.outreach_instagram) parts.push(`<span>📸 <a href="https://instagram.com/${escapeHTML(s.outreach_instagram.replace('@',''))}" target="_blank" rel="noopener">${escapeHTML(s.outreach_instagram)}</a></span>`);
    return parts.length ? `<div class="outreach-contact">${parts.join('')}</div>` : '';
  })();

  const outreachPanel = s.outreach_draft
    ? `${contactHtml}<div class="outreach-draft">${escapeHTML(s.outreach_draft)}</div>`
    : `${contactHtml}<p class="no-outreach">No outreach draft yet for this story.</p>`;

  return `
  <div class="card ${reviewed ? 'reviewed' : ''}"
       data-key="${escapeHTML(key)}"
       data-conf="${conf}"
       data-source="${escapeHTML((s.source_type||'').toLowerCase())}"
       data-text="${escapeHTML((s.name+' '+(s.location||'')+' '+(s.story_summary||'')).toLowerCase())}">
    <div class="card-tabs">
      <button class="tab-btn active" onclick="switchTab(this,'story-${escapeHTML(key)}')">Story</button>
      <button class="tab-btn" onclick="switchTab(this,'outreach-${escapeHTML(key)}')">Outreach</button>
    </div>
    <div id="story-${escapeHTML(key)}" class="tab-panel active">${storyPanel}</div>
    <div id="outreach-${escapeHTML(key)}" class="tab-panel">${outreachPanel}</div>
    <div class="reviewed-row">
      <label class="${reviewed ? 'checked' : ''}">
        <input type="checkbox" ${reviewed ? 'checked' : ''}
               onchange="toggleReviewed('${escapeHTML(key)}', this)">
        Reviewed by human
      </label>
    </div>
  </div>`;
}

function switchTab(btn, panelId) {
  const card = btn.closest('.card');
  card.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  card.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(panelId)?.classList.add('active');
}

function toggleReviewed(key, checkbox) {
  setReviewed(key, checkbox.checked);
  const card = checkbox.closest('.card');
  card.classList.toggle('reviewed', checkbox.checked);
  const label = checkbox.closest('label');
  label.classList.toggle('checked', checkbox.checked);
  updateStats();
}

let allStories = [];

function updateStats() {
  const reviewed = getReviewed();
  const reviewedCount = allStories.filter(s => reviewed[storyKey(s)]).length;
  document.getElementById('header-stats').innerHTML = `
    <span><strong>${allStories.length}</strong> stories</span>
    <span><strong>${reviewedCount}</strong> reviewed</span>`;
}

function groupByWeek(stories) {
  const groups = {};
  stories.forEach(s => {
    const d = s.run_date || 'unknown';
    if (!groups[d]) groups[d] = [];
    groups[d].push(s);
  });
  return Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0]));
}

function render(stories) {
  const app = document.getElementById('app');
  allStories = stories;
  updateStats();

  if (!stories.length) {
    app.innerHTML = '<div class="empty">No stories yet. The first run will populate this on Monday.</div>';
    return;
  }

  const groups = groupByWeek(stories);

  const html = groups.map(([date, groupStories]) => {
    const highCount = groupStories.filter(s => confidence(s.confidence) === 'high').length;
    const weekMeta = `${groupStories.length} ${groupStories.length === 1 ? 'story' : 'stories'}${highCount ? ` · ${highCount} high confidence` : ''}`;

    const byConf = { high: [], medium: [], low: [] };
    groupStories.forEach(s => byConf[confidence(s.confidence)].push(s));

    const confSections = ['high','medium','low'].map(c => {
      if (!byConf[c].length) return '';
      const label = c.charAt(0).toUpperCase() + c.slice(1) + ' Confidence';
      return `
        <div class="conf-group">
          <div class="conf-label">${label}</div>
          <div class="cards-row">${byConf[c].map(renderCard).join('')}</div>
        </div>`;
    }).join('');

    return `
      <div class="week-group">
        <div class="week-header">
          <span class="week-label">Week of ${formatDate(date)}</span>
          <span class="week-meta">${weekMeta}</span>
        </div>
        ${confSections}
      </div>`;
  }).join('');

  app.innerHTML = html;
  document.getElementById('count').textContent = stories.length + ' stories';
}

function filterCards() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  const conf = document.getElementById('filter-conf')?.value || '';
  const src = document.getElementById('filter-source')?.value || '';
  const cards = document.querySelectorAll('.card');
  let visible = 0;

  cards.forEach(card => {
    const matchQ = !q || (card.dataset.text || '').includes(q);
    const matchConf = !conf || card.dataset.conf === conf;
    const matchSrc = !src || card.dataset.source === src;
    const show = matchQ && matchConf && matchSrc;
    card.style.display = show ? '' : 'none';
    const weekGroup = card.closest('.week-group');
    if (show) visible++;
  });

  document.getElementById('count').textContent = visible + ' stories';

  // Hide empty week groups
  document.querySelectorAll('.week-group').forEach(g => {
    const anyVisible = [...g.querySelectorAll('.card')].some(c => c.style.display !== 'none');
    g.style.display = anyVisible ? '' : 'none';
  });
}

async function init() {
  try {
    const data = await fetch(RAW + 'data/results/all_stories.json?t=' + Date.now())
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
    render(data.stories || []);
  } catch(e) {
    document.getElementById('app').innerHTML =
      `<div class="error">Failed to load stories: ${escapeHTML(e.message)}</div>`;
    document.getElementById('header-stats').innerHTML = '<span>Error loading</span>';
  }
}

init();
</script>
</body>
</html>
